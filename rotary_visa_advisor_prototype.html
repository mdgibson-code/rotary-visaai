
<style>
  .chat-wrap { display: flex; flex-direction: column; height: 580px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .chat-header { padding: 14px 18px; border-bottom: 0.5px solid var(--color-border-tertiary); display: flex; align-items: center; gap: 10px; background: var(--color-background-secondary); }
  .chat-logo { width: 32px; height: 32px; border-radius: 50%; background: var(--color-background-info); display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--color-text-info); }
  .chat-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
  .chat-sub { font-size: 12px; color: var(--color-text-secondary); margin: 0; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 82%; display: flex; flex-direction: column; gap: 4px; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }
  .bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.55; }
  .msg.user .bubble { background: var(--color-background-info); color: var(--color-text-info); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--color-background-secondary); color: var(--color-text-primary); border-bottom-left-radius: 4px; border: 0.5px solid var(--color-border-tertiary); }
  .msg-label { font-size: 11px; color: var(--color-text-tertiary); padding: 0 4px; }
  .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 14px; border-bottom-left-radius: 4px; width: fit-content; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-text-tertiary); animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
  .chat-input-area { border-top: 0.5px solid var(--color-border-tertiary); padding: 12px; display: flex; gap: 8px; align-items: flex-end; background: var(--color-background-primary); }
  .chat-input-area textarea { flex: 1; resize: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 9px 12px; font-size: 14px; font-family: var(--font-sans); line-height: 1.5; min-height: 40px; max-height: 100px; background: var(--color-background-primary); color: var(--color-text-primary); overflow-y: auto; }
  .send-btn { width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--color-background-info); color: var(--color-text-info); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .summary-bar { border-top: 0.5px solid var(--color-border-tertiary); padding: 10px 14px; background: var(--color-background-secondary); display: none; align-items: center; justify-content: space-between; gap: 8px; }
  .summary-bar.visible { display: flex; }
  .summary-bar span { font-size: 12px; color: var(--color-text-secondary); }
  .copy-btn { font-size: 12px; padding: 5px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .copy-btn:active { transform: scale(0.97); }
  .disclaimer { font-size: 11px; color: var(--color-text-tertiary); text-align: center; padding: 6px 12px; }
</style>

<h2 class="sr-only">Rotary District visa advisor chat — enter your details to get personalized visa guidance</h2>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="chat-logo"><i class="ti ti-world" aria-hidden="true"></i></div>
    <div>
      <p class="chat-title">Rotary Exchange Visa Advisor</p>
      <p class="chat-sub">Prototype — placeholder visa logic</p>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="summary-bar" id="summaryBar">
    <span><i class="ti ti-check" aria-hidden="true" style="color:var(--color-text-success);margin-right:4px"></i>Advice summary ready</span>
    <button class="copy-btn" id="copyBtn"><i class="ti ti-copy" aria-hidden="true"></i>Copy summary</button>
  </div>

  <div class="disclaimer">For guidance only — always verify with official embassy sources and your Rotary coordinator.</div>

  <div class="chat-input-area">
    <textarea id="userInput" placeholder="Type your message here…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" aria-label="Send message"><i class="ti ti-arrow-up" aria-hidden="true"></i></button>
  </div>
</div>

<script>
const SYSTEM_PROMPT = `You are a visa guidance assistant for Rotary Youth Exchange students. Your role is to help students understand what they need to do to obtain their study/exchange visa before arriving in their host country.

SCOPE: You ONLY answer questions about visa and entry requirements for Rotary Youth Exchange students. If asked anything outside this scope, politely redirect: "I can only help with visa and entry requirements for your Rotary exchange. Please contact your Rotary coordinator for other questions."

LANGUAGE: Detect the language the student writes in and respond entirely in that language for the rest of the conversation.

INTAKE PROCESS: Before giving any visa advice, you MUST collect ALL of the following facts. Ask for them conversationally, not all at once:
1. Student's country of citizenship (passport country)
2. Host country (USA or Canada)
3. If Canada: which province
4. If USA: which state
5. Expected program start date and duration (typically 10 months)
6. Student's age

Do not give specific visa advice until you have all five facts above. You may give general orientation while collecting them.

RELIABILITY RULES:
- Always cite which rule or requirement category you are drawing from (e.g. "Under Canadian study permit rules..." or "US J-1 visa requirements state...")
- If you are not certain about a specific requirement, say so explicitly and direct the student to verify with the official embassy website or their Rotary coordinator
- Never guess or extrapolate. Uncertainty = defer to coordinator
- Always end advice with: "Please verify these requirements directly with the [country] embassy or consulate in [student's country], as requirements can change."

PLACEHOLDER VISA LOGIC (replace with real requirements):
[CANADA - Study Permit]
- Most foreign students staying >6 months need a Canadian Study Permit
- Students from visa-exempt countries (e.g. USA, UK, EU countries, Australia) need an Electronic Travel Authorization (eTA) plus Study Permit
- Students from non-visa-exempt countries need a Temporary Resident Visa (TRV) plus Study Permit
- Study Permit applications should be submitted at least 3 months before arrival
- Required documents typically include: acceptance letter from school, proof of financial support, passport valid for duration of stay, passport photos, application fee (~CAD $150)
- Biometrics required for most nationalities (fee ~CAD $85)
- Students under 17 may need additional guardian consent documentation

[USA - J-1 Exchange Visitor Visa]
- Rotary exchange students to the USA typically use the J-1 Exchange Visitor visa (not F-1 student visa)
- The J-1 requires a DS-2019 form issued by a Rotary-designated program sponsor
- Students must apply at a US embassy/consulate in their home country
- SEVIS fee (~USD $220) must be paid before the visa interview
- Required documents: DS-2019 form, valid passport, visa application fee (~USD $185), financial documentation, proof of ties to home country
- Processing times vary by country - some embassies have significant wait times
- Students should apply at least 3-4 months before program start
- Health insurance meeting J-1 minimums is mandatory

[NOTE TO ADMINISTRATOR: Replace the above placeholder logic with actual, verified requirements from official sources before deploying this tool.]

SUMMARY TRIGGER: When you have given complete advice covering the student's specific situation, end your final advice message with the exact token: [ADVICE_COMPLETE]`;

let conversationHistory = [];
let adviceSummary = null;
let isWaiting = false;

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg ' + role;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Visa Advisor';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrapper.appendChild(label);
  wrapper.appendChild(bubble);
  msgs.appendChild(wrapper);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const t = document.createElement('div');
  t.id = 'typing';
  t.className = 'msg assistant';
  t.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  msgs.appendChild(t);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage(userText) {
  if (!userText.trim() || isWaiting) return;
  isWaiting = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('userInput').value = '';

  addMessage('user', userText);
  conversationHistory.push({ role: 'user', content: userText });

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    removeTyping();

    let replyText = data.content?.[0]?.text || 'Sorry, I could not get a response. Please try again.';
    const isComplete = replyText.includes('[ADVICE_COMPLETE]');
    replyText = replyText.replace('[ADVICE_COMPLETE]', '').trim();

    addMessage('assistant', replyText);
    conversationHistory.push({ role: 'assistant', content: replyText });

    if (isComplete) {
      adviceSummary = buildSummary();
      document.getElementById('summaryBar').classList.add('visible');
    }
  } catch (err) {
    removeTyping();
    addMessage('assistant', 'Connection error. Please check your internet and try again.');
  }

  isWaiting = false;
  document.getElementById('sendBtn').disabled = false;
}

function buildSummary() {
  let text = 'ROTARY EXCHANGE VISA GUIDANCE SUMMARY\n';
  text += '=====================================\n';
  text += 'Generated: ' + new Date().toLocaleDateString() + '\n\n';
  const assistantMessages = conversationHistory.filter(m => m.role === 'assistant');
  const lastAdvice = assistantMessages[assistantMessages.length - 1]?.content || '';
  text += lastAdvice + '\n\n';
  text += '-------------------------------------\n';
  text += 'IMPORTANT: This summary is for guidance only.\n';
  text += 'Always verify requirements with the official embassy\n';
  text += 'website and your Rotary coordinator before applying.\n';
  return text;
}

document.getElementById('copyBtn').addEventListener('click', () => {
  if (!adviceSummary) return;
  navigator.clipboard.writeText(adviceSummary).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i>Copied!';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i>Copy summary'; }, 2000);
  });
});

const ta = document.getElementById('userInput');
ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(ta.value); }
});
document.getElementById('sendBtn').addEventListener('click', () => sendMessage(ta.value));
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 100) + 'px';
});

async function initChat() {
  showTyping();
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: 'Hello' }]
      })
    });
    const data = await response.json();
    removeTyping();
    const text = data.content?.[0]?.text || 'Hello! I\'m here to help with your visa questions.';
    addMessage('assistant', text);
    conversationHistory.push({ role: 'user', content: 'Hello' });
    conversationHistory.push({ role: 'assistant', content: text });
  } catch {
    removeTyping();
    addMessage('assistant', 'Hello! I\'m your Rotary Exchange Visa Advisor. I\'m here to help you understand what visa steps you need to take before your exchange. To get started, could you tell me which country you are from?');
    conversationHistory.push({ role: 'user', content: 'Hello' });
    conversationHistory.push({ role: 'assistant', content: conversationHistory[conversationHistory.length-1]?.content || '' });
  }
}

initChat();
</script>
